name: Check for broken links

on:
  push:
    branches:
      - master
      - main
    paths:
      - "assets/**"
      - "**.html"
      - "**.js"
      - "**.liquid"
      - "**/*.md"
      - "**.yml"
      - "!.github/workflows/axe.yml"
      - "!.github/workflows/deploy-docker-tag.yml"
      - "!.github/workflows/deploy-image.yml"
      - "!.github/workflows/docker-slim.yml"
      - "!.github/workflows/lighthouse-badger.yml"
      - "!.github/workflows/prettier.yml"
      - "!lighthouse_results/**"
  pull_request:
    branches:
      - master
      - main
    paths:
      - "assets/**"
      - "**.html"
      - "**.js"
      - "**.liquid"
      - "**/*.md"
      - "**.yml"
      - "!.github/workflows/axe.yml"
      - "!.github/workflows/deploy-docker-tag.yml"
      - "!.github/workflows/deploy-image.yml"
      - "!.github/workflows/docker-slim.yml"
      - "!.github/workflows/lighthouse-badger.yml"
      - "!.github/workflows/prettier.yml"
      - "!lighthouse_results/**"

jobs:
  link-checker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Link Checker 🔗
        uses: lycheeverse/lychee-action@v2.6.0
        with:
          fail: true
          # v2.0.2 shipped lychee 0.16.x, which lacks --root-dir; pin a current lychee release.
          lycheeVersion: v0.23.0
          # --root-dir resolves leading-/ links in Markdown (e.g. /assets/pdf/…)
          # unsplash.com → 401 and support.mozilla.org → 429 for CI/bot requests (not real dead links)
          # removed md files that include liquid tags
          args: --user-agent 'curl/7.54' --root-dir . --exclude 'unsplash\.com' --exclude 'support\.mozilla\.org' --exclude 'file:///.*blog/' --exclude-path README.md --exclude-path _pages/404.md --exclude-path _pages/blog.md --exclude-path _pages/about_einstein.md --exclude-path _posts/2018-12-22-distill.md --exclude-path _posts/2023-04-24-videos.md --exclude-path _books/the_godfather.md --exclude-path .github/instructions/bibtex-bibliography.instructions.md --exclude-path .github/instructions/yaml-configuration.instructions.md --exclude-path .github/instructions/markdown-content.instructions.md --exclude-path .github/instructions/liquid-templates.instructions.md --exclude-path AGENTS.md --exclude-path SEO.md --exclude-path '.venv/**' --exclude-path '.venv-rendercv/**' --exclude-path 'node_modules/**' --exclude-path '_site/**' --exclude-path 'lighthouse_results/**' --verbose --no-progress './**/*.md' './**/*.html'
