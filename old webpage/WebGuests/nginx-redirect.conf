# Nginx redirect rules for old MPIM guest pages.
# Use inside the relevant `server { ... }` block.

# Exact legacy paths
location = /aretz/education/ { return 301 https://davidaretz.github.io/cv/; }
location = /education/ { return 301 https://davidaretz.github.io/cv/; }

location = /aretz/talks/ { return 301 https://davidaretz.github.io/talks/; }
location = /talks/ { return 301 https://davidaretz.github.io/talks/; }
location = /aretz/talks/talks/ { return 301 https://davidaretz.github.io/talks/; }

location = /aretz/ { return 301 https://davidaretz.github.io/; }
location = / { return 301 https://davidaretz.github.io/; }
location = /aretz/index.html { return 301 https://davidaretz.github.io/; }
location = /index.html { return 301 https://davidaretz.github.io/; }
location = /aretz/feed.xml { return 301 https://davidaretz.github.io/feed.xml; }
location = /feed.xml { return 301 https://davidaretz.github.io/feed.xml; }

# Prefix fallbacks
location /aretz/ { return 301 https://davidaretz.github.io$request_uri; }
location / { return 301 https://davidaretz.github.io$request_uri; }
